<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Formulario Completo</title>
<style>body{font-family:Arial,sans-serif;max-width:500px;margin:40px auto;padding:20px}label{display:block;margin-bottom:4px;font-weight:bold;font-size:14px}input,select,textarea{width:100%;padding:8px;margin-bottom:16px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box}button{background:#f7941d;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer}</style>
</head>
<body>
<h2>Formulario de registro</h2>
<form>
<label>Nombre</label><input type="text" placeholder="Tu nombre" required>
<label>Email</label><input type="email" placeholder="tu@email.com" required>
<label>Carrera</label><select><option>Ingeniería de Sistemas</option></select>
<label>Mensaje</label><textarea rows="4"></textarea>
<button type="submit">Registrar</button>
</form>
</body></html>
